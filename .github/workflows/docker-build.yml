# 构建后端 Docker 镜像并推送到 GitHub Container Registry (ghcr.io)
name: Docker — 后端镜像

on:
  push:
    branches: [main, master]
    tags: ['v*']
    paths:
      - 'server/**'
      - '.github/workflows/docker-build.yml'
  pull_request:
    branches: [main, master]
    paths:
      - 'server/**'
      - '.github/workflows/docker-build.yml'
  workflow_dispatch:

permissions:
  contents: read
  packages: write

concurrency:
  group: docker-server-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  IMAGE_NAME: math-practice-server

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: 登录 ghcr.io
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: 设置 Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: 生成版本号
        id: version
        run: |
          owner=$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')
          echo "image=ghcr.io/${owner}/${{ env.IMAGE_NAME }}" >> "$GITHUB_OUTPUT"

          SHORT_SHA=$(echo '${{ github.sha }}' | cut -c1-7)
          DATE_TAG=$(date -u +%Y%m%d)
          RUN_NUM=${{ github.run_number }}
          PKG_VER=$(node -p "require('./server/package.json').version")

          # 自动版本：<package.json version>-<run_number>  例如 1.0.0-42
          AUTO_VER="${PKG_VER}-${RUN_NUM}"
          # 日期版本：YYYYMMDD.<run_number>  例如 20260512.42
          DATE_VER="${DATE_TAG}.${RUN_NUM}"

          echo "short_sha=${SHORT_SHA}" >> "$GITHUB_OUTPUT"
          echo "auto_ver=${AUTO_VER}"   >> "$GITHUB_OUTPUT"
          echo "date_ver=${DATE_VER}"   >> "$GITHUB_OUTPUT"
          echo "pkg_ver=${PKG_VER}"     >> "$GITHUB_OUTPUT"

          echo "::notice::镜像版本: auto=${AUTO_VER} date=${DATE_VER} sha=${SHORT_SHA}"

      - name: 镜像元数据（标签）
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ steps.version.outputs.image }}
          tags: |
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master' }}
            type=raw,value=${{ steps.version.outputs.auto_ver }}
            type=raw,value=${{ steps.version.outputs.date_ver }}
            type=raw,value=sha-${{ steps.version.outputs.short_sha }}
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}

      - name: 构建（PR 仅校验，不推送）
        uses: docker/build-push-action@v6
        with:
          context: ./server
          file: ./server/Dockerfile
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: |
            ${{ steps.meta.outputs.labels }}
            org.opencontainers.image.version=${{ steps.version.outputs.auto_ver }}
          build-args: |
            APP_VERSION=${{ steps.version.outputs.auto_ver }}
            BUILD_SHA=${{ steps.version.outputs.short_sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
